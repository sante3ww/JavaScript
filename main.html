<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор случайных чисел</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Случайное число</h1>
    <p id="result">Нажмите кнопку</p>
    <button onclick="generateRandomNumber()">Сгенерировать</button>

    <script>
        function generateRandomNumber() {
            let randomNumber = Math.floor(Math.random() * 100) + 1;
            document.getElementById("result").innerText = "Число: " + randomNumber;
        }
    </script>
</body>
</html>
