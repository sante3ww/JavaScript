<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #6a11cb, #2575fc);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }
        h2 {
            color: #333;
        }
        input {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #2575fc;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }
        .success {
            color: green;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        <input type="text" id="username" placeholder="Введите имя">
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <p id="message"></p>
    </div>

    <script>
        function register() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            let message = document.getElementById("message");
            message.classList.remove("error", "success");

            if (username.length < 3) {
                message.innerHTML = "Имя должно быть не менее 3 символов!";
                message.classList.add("error");
                return;
            }
            
            if (password.length < 6) {
                message.innerHTML = "Пароль должен быть не менее 6 символов!";
                message.classList.add("error");
                return;
            }
            
            message.innerHTML = "Вы успешно зарегистрированы!";
            message.classList.add("success");
        }
    </script>
</body>
</html>
